spring.application.name=RevPay

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT Settings (dummy values for unit tests)
jwt.secret=TestSecretKeyForJwtThatIsLongEnoughForHS256Algorithm1234567890
jwt.expiration=86400000

# Disable Spring Security auto-config for slice tests
spring.security.user.name=test
spring.security.user.password=test

# Logging ? reduce noise during test runs
logging.level.root=WARN
logging.level.com.revpay=INFO